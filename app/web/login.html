<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 数学知识图谱</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --bg: #f1f5f9;
            --surface: #fff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
            --success: #10b981;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            margin-bottom: 16px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }
        
        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }
        
        .tabs {
            display: flex;
            background: var(--bg);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.15);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            outline: none;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .form-group input::placeholder {
            color: #cbd5e1;
        }
        
        .form-group .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .error-msg {
            background: #fef2f2;
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .form-panel {
            display: none;
        }
        
        .form-panel.active {
            display: block;
        }
        
        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .success-overlay.show {
            display: flex;
        }
        
        .success-content {
            text-align: center;
        }
        
        .success-icon {
            width: 64px;
            height: 64px;
            background: var(--success);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            margin-bottom: 16px;
            animation: pop 0.3s ease-out;
        }
        
        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .success-content h2 {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .success-content p {
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">📐</div>
            <h1>数学知识图谱</h1>
            <p>Math Knowledge Graph</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">登录</button>
            <button class="tab" onclick="switchTab('register')">注册</button>
        </div>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <!-- 登录表单 -->
        <div class="form-panel active" id="loginPanel">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="submit-btn">登录</button>
            </form>
        </div>
        
        <!-- 注册表单 -->
        <div class="form-panel" id="registerPanel">
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="3-50位字母、数字或下划线" 
                           pattern="^[a-zA-Z0-9_]{3,50}$" required>
                    <div class="hint">仅支持字母、数字和下划线</div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="至少6位" minlength="6" required>
                </div>
                <div class="form-group">
                    <label>显示名称（可选）</label>
                    <input type="text" name="display_name" placeholder="你希望显示的名字">
                </div>
                <button type="submit" class="submit-btn">注册</button>
            </form>
        </div>
    </div>
    
    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon">✓</div>
            <h2 id="successTitle">登录成功</h2>
            <p id="successMsg">正在跳转...</p>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        // 检查是否已登录
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/web';
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tabs .tab:first-child').classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.querySelector('.tabs .tab:last-child').classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
            
            hideError();
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }
        
        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }
        
        function showSuccess(title, msg) {
            document.getElementById('successTitle').textContent = title;
            document.getElementById('successMsg').textContent = msg;
            document.getElementById('successOverlay').classList.add('show');
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            hideError();
            
            const form = e.target;
            const btn = form.querySelector('.submit-btn');
            const formData = new FormData(form);
            
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: formData.get('username'),
                        password: formData.get('password')
                    })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.detail || '登录失败');
                }
                
                // 保存 token
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                showSuccess('登录成功', '正在跳转到知识图谱...');
                
                setTimeout(() => {
                    window.location.href = '/web';
                }, 1000);
                
            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            hideError();
            
            const form = e.target;
            const btn = form.querySelector('.submit-btn');
            const formData = new FormData(form);
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: formData.get('username'),
                        password: formData.get('password'),
                        display_name: formData.get('display_name') || null
                    })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.detail || '注册失败');
                }
                
                // 保存 token
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                showSuccess('注册成功', '欢迎加入数学知识图谱！');
                
                setTimeout(() => {
                    window.location.href = '/web';
                }, 1500);
                
            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }
    </script>
</body>
</html>
