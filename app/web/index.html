<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学知识图谱 - MathKG</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#6366f1;--primary-light:#818cf8;--bg:#f1f5f9;
            --surface:#fff;--text:#1e293b;--text-secondary:#64748b;
            --border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
            --shadow-lg:0 4px 12px rgba(0,0,0,.1),0 16px 48px rgba(0,0,0,.08);
        }
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
        .topbar-logo{display:flex;align-items:center;gap:10px;font-size:1.2em;font-weight:700;color:var(--primary)}
        .topbar-logo .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1em}
        .topbar-nav{display:flex;gap:4px}
        .nav-btn{padding:8px 18px;border:none;background:transparent;border-radius:8px;font-size:.9em;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .2s}
        .nav-btn:hover{background:var(--bg);color:var(--text)}
        .nav-btn.active{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
        .topbar-right{display:flex;align-items:center;gap:16px}
        .search-box{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px;gap:8px;width:220px;transition:all .2s}
        .search-box:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .search-box input{border:none;background:transparent;outline:none;font-size:.9em;width:100%;color:var(--text)}
        .search-box input::placeholder{color:var(--text-secondary)}
        .main-layout{display:flex;height:calc(100vh - 64px);overflow:hidden}
        .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:16px 0}
        .sidebar-section{margin-bottom:20px}
        .sidebar-title{font-size:.72em;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em;padding:0 16px 8px}
        .grade-filter{padding:0 8px}
        .grade-btn{width:100%;display:flex;align-items:center;gap:10px;padding:7px 10px;border:none;background:transparent;border-radius:8px;cursor:pointer;transition:all .15s;text-align:left;font-size:.86em;color:var(--text)}
        .grade-btn:hover{background:var(--bg)}
        .grade-btn.active{background:var(--primary);color:#fff}
        .grade-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
        .grade-btn .grade-name{flex:1;font-weight:500}
        .grade-btn .grade-count{font-size:.75em;opacity:.65;font-weight:400}
        .grade-btn.active .grade-count{opacity:.9}
        .stat-mini{padding:0 8px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .stat-mini-card{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
        .stat-mini-value{font-size:1.6em;font-weight:700;color:var(--primary);line-height:1}
        .stat-mini-label{font-size:.72em;color:var(--text-secondary);margin-top:4px}
        .branch-filter{padding:0 8px;display:flex;flex-wrap:wrap}
        .branch-tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.78em;margin:2px;cursor:pointer;border:1.5px solid var(--border);color:var(--text-secondary);background:var(--surface);transition:all .15s;font-weight:500}
        .branch-tag:hover{border-color:var(--primary);color:var(--primary)}
        .branch-tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .main-content{flex:1;overflow-y:auto;padding:20px}
        .graph-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
        .mini-btn{padding:5px 13px;border:1px solid var(--border);background:var(--surface);border-radius:7px;font-size:.83em;cursor:pointer;transition:all .15s;color:var(--text)}
        .mini-btn:hover{border-color:var(--primary);color:var(--primary)}
        .mini-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .graph-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
        .graph-container{flex:1;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:520px}
        .graph-legend{position:absolute;bottom:14px;left:14px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);padding:11px 15px;border-radius:10px;box-shadow:var(--shadow);font-size:.8em;display:flex;flex-direction:column;gap:5px;z-index:10}
        .legend-row{display:flex;align-items:center;gap:7px}
        .legend-circle{width:10px;height:10px;border-radius:50%}
        .graph-info{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);padding:9px 13px;border-radius:10px;box-shadow:var(--shadow);font-size:.8em;color:var(--text-secondary);z-index:10}
        .graph-info strong{color:var(--text)}
        .nodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
        .node-card{background:var(--surface);border-radius:12px;padding:15px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
        .node-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--primary-light)}
        .node-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:12px 0 0 12px}
        .node-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
        .node-card-title{font-size:.97em;font-weight:600;line-height:1.3}
        .type-badge{font-size:.7em;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0;margin-left:7px}
        .tb-concept{background:#ede9fe;color:#7c3aed}.tb-theorem{background:#dbeafe;color:#2563eb}
        .tb-formula{background:#dcfce7;color:#16a34a}.tb-method{background:#fef3c7;color:#d97706}
        .tb-law{background:#fee2e2;color:#dc2626}.tb-conjecture{background:#fce7f3;color:#db2777}
        .node-card-desc{font-size:.84em;color:var(--text-secondary);line-height:1.5;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .node-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
        .mini-tag{font-size:.72em;padding:2px 7px;border-radius:10px;font-weight:500}
        .mt-grade{background:#f1f5f9;color:var(--text-secondary)}.mt-branch{background:#f0fdf4;color:#15803d}
        .node-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--border)}
        .diff-row{display:flex;align-items:center;gap:5px;font-size:.78em;color:var(--text-secondary)}
        .diff-dots{display:flex;gap:2px}
        .diff-dot{width:7px;height:7px;border-radius:50%;background:#e2e8f0}
        .diff-dot.filled{background:#f59e0b}
        .time-est{font-size:.76em;color:var(--text-secondary)}
        .prereq-chip{
            display:inline-flex;
            align-items:center;
            gap:4px;
            padding:4px 8px;
            background:#f1f5f9;
            border-radius:6px;
            font-size:.8em;
            color:#64748b;
            font-weight:500;
            transition:all .2s
        }
        .prereq-chip.has{
            background:#dbeafe;
            color:#0284c7
        }
        .prereq-chip.isolated{
            background:#fee2e2;
            color:#dc2626;
            font-weight:600
        }
        .prereq-chip.has{color:var(--primary);font-weight:500;background:#ede9fe}
        .detail-panel{width:360px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:20px}
        .detail-panel.hidden{display:none}
        .detail-close{float:right;width:26px;height:26px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:.9em;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
        .detail-close:hover{background:var(--border)}
        .detail-title{font-size:1.15em;font-weight:700;margin-bottom:3px;padding-right:34px}
        .detail-subtitle{font-size:.82em;color:var(--text-secondary);margin-bottom:15px}
        .detail-section{margin-bottom:16px}
        .detail-section-title{font-size:.7em;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
        .detail-desc{font-size:.88em;color:var(--text);line-height:1.6;background:var(--bg);border-radius:8px;padding:11px}
        .detail-tags{display:flex;flex-wrap:wrap;gap:5px}
        .detail-tag{padding:3px 9px;border-radius:8px;font-size:.78em;font-weight:500}
        .detail-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
        .metric-card{background:var(--bg);border-radius:10px;padding:9px;text-align:center}
        .metric-value{font-size:1.25em;font-weight:700;color:var(--primary)}
        .metric-label{font-size:.7em;color:var(--text-secondary);margin-top:2px}
        .rel-item{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--bg);border-radius:8px;font-size:.85em;cursor:pointer;transition:all .15s}
        .rel-item:hover{background:#ede9fe}
        .rel-arrow{color:var(--text-secondary);font-size:.8em}
        .quiz-header{background:var(--surface);border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
        .quiz-progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:14px}
        .quiz-progress-track{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
        .quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:4px;transition:width .3s}
        .quiz-progress-text{font-size:.83em;color:var(--text-secondary);white-space:nowrap}
        .quiz-level-select{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
        .quiz-card{background:var(--surface);border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:11px}
        .quiz-question{font-size:1.05em;font-weight:600;margin-bottom:5px}
        .quiz-meta{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
        .quiz-meta-tag{font-size:.75em;padding:2px 8px;border-radius:10px;font-weight:500}
        .quiz-meta-tag.mt-grade{background:#f1f5f9;color:var(--text-secondary)}.quiz-meta-tag.mt-branch{background:#f0fdf4;color:#15803d}
        .quiz-btn-group{display:flex;gap:10px}
        .quiz-btn{flex:1;padding:11px;border:none;border-radius:10px;font-size:.97em;font-weight:600;cursor:pointer;transition:all .2s}
        .quiz-btn-known{background:#dcfce7;color:#16a34a}.quiz-btn-known:hover{background:#16a34a;color:#fff}
        .quiz-btn-unknown{background:#fee2e2;color:#dc2626}.quiz-btn-unknown:hover{background:#dc2626;color:#fff}
        .quiz-actions{display:flex;gap:10px;margin-top:12px}
        .quiz-action-btn{padding:8px 18px;border:1px solid var(--border);background:var(--surface);border-radius:8px;font-size:.85em;cursor:pointer;transition:all .15s;color:var(--text)}
        .quiz-action-btn:hover{border-color:var(--primary);color:var(--primary)}
        .quiz-action-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
        .stats-hero{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:16px;padding:26px;color:#fff;margin-bottom:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
        .hero-stat{text-align:center}
        .hero-stat-value{font-size:2.2em;font-weight:700}
        .hero-stat-label{font-size:.82em;opacity:.82;margin-top:4px}
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .stats-card{background:var(--surface);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
        .stats-card-title{font-size:.95em;font-weight:600;margin-bottom:15px;display:flex;align-items:center;gap:7px}
        .level-bar-item{margin-bottom:13px}
        .level-bar-header{display:flex;justify-content:space-between;font-size:.84em;margin-bottom:5px}
        .level-bar-name{font-weight:500}.level-bar-count{color:var(--text-secondary)}
        .level-bar-track{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
        .level-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
        .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .page-title{font-size:1.3em;font-weight:700}
        .page-title span{font-size:.75em;color:var(--text-secondary);font-weight:400;margin-left:8px}
        .sort-select{padding:6px 11px;border:1px solid var(--border);border-radius:8px;font-size:.86em;background:var(--surface);color:var(--text);cursor:pointer}
        .graph-tooltip{position:fixed;background:#fff;border-radius:10px;padding:9px 13px;box-shadow:var(--shadow-lg);font-size:.83em;max-width:250px;pointer-events:none;z-index:1000;border:1px solid var(--border);display:none}
        .graph-tooltip-title{font-weight:600;margin-bottom:3px}
        .graph-tooltip-meta{color:var(--text-secondary);line-height:1.5}
        .search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;margin-top:4px;box-shadow:var(--shadow-lg);max-height:280px;overflow-y:auto;z-index:200;display:none}
        .search-results.show{display:block}
        .search-item{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
        .search-item:last-child{border-bottom:none}
        .search-item:hover{background:var(--bg)}
        .search-item-name{font-weight:500;font-size:.88em}
        .search-item-meta{font-size:.76em;color:var(--text-secondary);margin-top:2px}
        .toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:#fff;padding:11px 18px;border-radius:10px;font-size:.88em;box-shadow:var(--shadow-lg);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}
        .loading{text-align:center;padding:50px;color:var(--text-secondary);font-size:.95em}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
        .empty-state-icon{font-size:2.8em;margin-bottom:14px}
        .empty-state-title{font-size:1.05em;font-weight:600;color:var(--text);margin-bottom:7px}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        @media(max-width:900px){.sidebar{width:210px}.detail-panel{width:280px}.stats-grid{grid-template-columns:1fr}.stats-hero{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
<div class="topbar">
    <div class="topbar-logo">
        <div class="logo-icon">∫</div>
        <span>数学知识图谱</span>
    </div>
    <div class="topbar-nav">
        <button class="nav-btn active" data-page="graph" onclick="showPage('graph')">🗺️ 图谱</button>
        <button class="nav-btn" data-page="list" onclick="showPage('list')">📋 知识库</button>
        <button class="nav-btn" data-page="conjectures" onclick="showPage('conjectures')">🚀 前沿问题</button>
        <button class="nav-btn" data-page="mathematicians" onclick="showPage('mathematicians')">👨‍🔬 数学家</button>
        <button class="nav-btn" data-page="quiz" onclick="showPage('quiz')">📝 同步</button>
        <button class="nav-btn" data-page="wrong-questions" onclick="showPage('wrong-questions')">📚 错题本</button>
        <button class="nav-btn" data-page="stats" onclick="showPage('stats')">📊 统计</button>
    </div>
    <div class="topbar-right">
        <div style="position:relative">
            <div class="search-box">
                <span>🔍</span>
                <input id="searchInput" placeholder="搜索知识点..." oninput="handleSearch(this.value)" onblur="setTimeout(()=>document.getElementById('searchResults').classList.remove('show'),200)">
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">📚 概览</div>
            <div class="stat-mini">
                <div class="stat-mini-card"><div class="stat-mini-value" id="totalNodes">—</div><div class="stat-mini-label">知识点</div></div>
                <div class="stat-mini-card"><div class="stat-mini-value" id="totalBranches">—</div><div class="stat-mini-label">分支</div></div>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-title">🎓 年级筛选</div>
            <div class="grade-filter" id="gradeFilter"></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-title">🔬 数学分支</div>
            <div class="branch-filter" id="branchFilter"></div>
        </div>
    </div>

    <div class="main-content" id="mainContent"><div class="loading">加载中</div></div>
    <div class="detail-panel hidden" id="detailPanel">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="detail-title" id="detailTitle">—</div>
        <div class="detail-subtitle" id="detailSubtitle"></div>
        <div id="detailContent"></div>
    </div>
</div>

<div class="graph-tooltip" id="graphTooltip" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
const API='http://localhost:8088',USER_ID='student_001';
// 全局辅助函数
function getPrereqIds(p){return(p||[]).map(x=>typeof x==='object'?x.nodeId:x);}
const GRADE_LEVELS=[
    {id:'all',name:'全部',color:'#6366f1'},
    {id:'小学一年级',name:'小学一年级',color:'#10b981'},{id:'小学二年级',name:'小学二年级',color:'#059669'},
    {id:'小学三年级',name:'小学三年级',color:'#0891b2'},{id:'小学四年级',name:'小学四年级',color:'#0284c7'},
    {id:'小学五年级',name:'小学五年级',color:'#7c3aed'},{id:'小学六年级',name:'小学六年级',color:'#db2777'},
    {id:'初中一年级',name:'初中一年级',color:'#d97706'},{id:'初中二年级',name:'初中二年级',color:'#ea580c'},
    {id:'初中三年级',name:'初中三年级',color:'#dc2626'},{id:'高中一年级',name:'高中一年级',color:'#2563eb'},
    {id:'高中二年级',name:'高中二年级',color:'#1d4ed8'},{id:'高中三年级',name:'高中三年级',color:'#1e40af'},
    {id:'大学及以上',name:'大学及以上',color:'#374151'},
];
const BRANCH_NAMES={arithmetic:'算术',algebra:'代数',geometry:'几何',analysis:'分析',probability:'概率',statistics:'统计',discrete:'离散数学',number_theory:'数论',logic:'逻辑',topology:'拓扑',applied:'应用数学',other:'其他',trigonometry:'三角学',dynamics:'动力系统',numerical:'数值分析',optimization:'优化',pde:'微分方程',physics:'数学物理',
// 中文分支
'小学数学':'小学数学','高等数学':'高等数学','拓扑学':'拓扑学','图论':'图论','博弈论':'博弈论','范畴论':'范畴论','随机过程':'随机过程','算术':'算术','控制论':'控制论','线性代数':'线性代数','复分析':'复分析','概率论':'概率论','统计学':'统计学','组合数学':'组合数学','离散数学':'离散数学','逻辑学':'逻辑学','优化理论':'优化理论','动力系统':'动力系统','数值分析':'数值分析','偏微分方程':'偏微分方程','集合论':'集合论','三角学':'三角学','数论':'数论','泛函分析':'泛函分析','微分几何':'微分几何','抽象代数':'抽象代数',
// 详细分支
'抽象代数(详细)':'抽象代数(详细)','微分几何(详细)':'微分几何(详细)','复分析(详细)':'复分析(详细)',
// 英文分支
'functional_analysis':'泛函分析','differential_geometry':'微分几何','abstract_algebra':'抽象代数','category_theory':'范畴论','stochastic_processes':'随机过程','graph_theory':'图论','game_theory':'博弈论','control_theory':'控制论'};
const TYPE_BADGE={concept:'tb-concept',theorem:'tb-theorem',formula:'tb-formula',method:'tb-method',law:'tb-law',conjecture:'tb-conjecture'};
const GRADE_COLOR={};GRADE_LEVELS.forEach(g=>GRADE_COLOR[g.id]=g.color);
const ERROR_TYPES={
    "concept_error":"概念理解错误",
    "calculation_error":"计算错误",
    "formula_error":"公式记错",
    "misunderstanding":"审题错误",
    "careless":"粗心大意",
    "wrong_approach":"思路错误",
    "confusion":"知识点混淆",
    "other":"其他"
};

let allNodes=[],filteredNodes=[],userKnowledge={},currentPage='graph',selectedGrade='all',selectedBranch='';
let currentSimulation=null;
let quizQuestions=[],quizIndex=0,quizAnswers={},quizLevel='',quizBranch='';
let quizReviewed=new Set(); // 本轮已同步的节点ID（避免userKnowledge残留干扰）
let graphMode='all';
let graphFocusNodeId=null; // 图谱聚焦节点ID
let inLinks=new Map(); // 全局入边映射，用于renderList

// ============================================================
async function init(){
    await Promise.all([loadNodes(),loadUserKnowledge(),loadBranches()]);
    // 初始化全局inLinks映射
    initInLinks();
    renderGradeFilter();renderBranchFilter();updateStats();showPage('graph');
}

// 初始化全局入边映射
function initInLinks(){
    inLinks=new Map();
    const nodeIds=new Set(allNodes.map(n=>n.id));
    allNodes.forEach(n=>{
        if(n.prerequisites){
            for(const p of n.prerequisites){
                const pid=typeof p==='object'?p.nodeId:p;
                if(nodeIds.has(pid)){
                    inLinks.set(n.id,(inLinks.get(n.id)||[]).concat([pid]));
                }
            }
        }
    });
}

async function loadNodes(){
    try{
        const r=await fetch(`${API}/nodes?limit=50000`);
        const d=await r.json();
        allNodes=d.nodes||[];applyFilters();
    }catch(e){allNodes=[]}
}

async function loadUserKnowledge(){
    try{
        const r=await fetch(`${API}/users/${USER_ID}/profile`);
        const p=await r.json();
        const kn=p.known_nodes||[];
        userKnowledge={};
        kn.forEach(n=>{const id=typeof n==='string'?n:(n.node_id||n.id);userKnowledge[id]={status:'known'}});
    }catch(e){userKnowledge={}}
}

function renderBranchFilter(){
    const el=document.getElementById('branchFilter');
    if(!el)return;
    const brs={};
    allNodes.forEach(n=>{const b=n.branch||'other';brs[b]=(brs[b]||0)+1});
    el.innerHTML=Object.entries(brs).sort((a,b)=>b[1]-a[1]).map(([k,c])=>`<span class="branch-tag${selectedBranch===k?' active':''}" onclick="toggleBranch('${k}')">${BRANCH_NAMES[k]||k}(${c})</span>`).join('');
    document.getElementById('totalBranches').textContent=Object.keys(brs).length;
}

async function loadBranches(){
    const brs={};
    allNodes.forEach(n=>{const b=n.branch||'other';brs[b]=(brs[b]||0)+1});
    const el=document.getElementById('branchFilter');
    el.innerHTML=Object.entries(brs).sort((a,b)=>b[1]-a[1]).map(([k,c])=>`<span class="branch-tag${selectedBranch===k?' active':''}" onclick="toggleBranch('${k}')">${BRANCH_NAMES[k]||k}(${c})</span>`).join('');
    document.getElementById('totalBranches').textContent=Object.keys(brs).length;
}

function applyFilters(){
    filteredNodes=allNodes.filter(n=>{
        if(selectedGrade!=='all'){if(!n.tags||!n.tags.includes(selectedGrade))return false}
        if(selectedBranch&&n.branch!==selectedBranch)return false;
        return true;
    });
    document.getElementById('totalNodes').textContent=allNodes.length;
}

function renderGradeFilter(){
    const el=document.getElementById('gradeFilter');
    const counts={all:allNodes.length};
    allNodes.forEach(n=>{if(n.tags)for(const t of n.tags){counts[t]=(counts[t]||0)+1}});
    el.innerHTML=GRADE_LEVELS.map(g=>`<button class="grade-btn${selectedGrade===g.id?' active':''}" onclick="selectGrade('${g.id}')">
        <span class="grade-dot" style="background:${g.color}"></span>
        <span class="grade-name">${g.name}</span>
        <span class="grade-count">${g.id==='all'?allNodes.length:(counts[g.id]||0)}</span>
    </button>`).join('');
}

function selectGrade(id){selectedGrade=id;applyFilters();renderGradeFilter();if(currentPage==='graph')renderGraph();else if(currentPage==='list')renderList();}

function toggleBranch(b){selectedBranch=selectedBranch===b?'':b;applyFilters();loadBranches();if(currentPage==='graph')renderGraph();else if(currentPage==='list')renderList();}

function updateStats(){
    document.getElementById('totalNodes').textContent=allNodes.length;
}

// ============================================================
function showPage(page){
    currentPage=page;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
    switch(page){
        case'graph':renderGraphPage();break;
        case'list':renderListPage();break;
        case'conjectures':renderConjecturesPage();break;
        case'mathematicians':renderMathematiciansPage();break;
        case'quiz':renderQuizPage();break;
        case'wrong-questions':renderWrongQuestionsPage();break;
        case'stats':renderStatsPage();break;
    }
    closeDetail();
}

// ============================================================
function renderGraphPage(){
    document.getElementById('mainContent').innerHTML=`
    <div class="graph-wrap">
        <div class="graph-toolbar">
            <div style="display:flex;gap:5px">
                <button class="mini-btn${graphMode==='all'?' active':''}" onclick="setGraphMode('all')">全局</button>
                <button class="mini-btn${graphMode==='grade'?' active':''}" onclick="setGraphMode('grade')">按年级</button>

function setGraphMode(m){graphMode=m;renderGraph();}

function renderGraph(){
    // getPrereqIds 已移至全局作用域 (index.html 顶部)
    const svgEl=document.getElementById('graphSvg');
    if(!svgEl)return;
    const container=svgEl.parentElement;
    const W=container.clientWidth,H=container.clientHeight;
    const svg=d3.select(svgEl).attr('width',W).attr('height',H);
    svg.selectAll('*').remove();
    if(currentSimulation){currentSimulation.stop();currentSimulation=null}

    // 准备数据
    let displayCount, nodes;
    
    // 如果有聚焦节点，显示该节点及其关联知识（最多50个）
    if(graphFocusNodeId){
        const focusNode=allNodes.find(n=>n.id===graphFocusNodeId);
        if(!focusNode){graphFocusNodeId=null;renderGraph();return}
        
        const neighborIds=new Set([graphFocusNodeId]);
        // 加入前置知识
        (getPrereqIds(focusNode.prerequisites)||[]).forEach(pid=>neighborIds.add(pid));
        // 加入后续知识
        allNodes.forEach(n=>{if(getPrereqIds(n.prerequisites).includes(graphFocusNodeId))neighborIds.add(n.id)});
        // 限制邻居节点数
        const allNeighborIds=[...neighborIds];
        nodes=allNodes.filter(n=>neighborIds.has(n.id)).slice(0,50).map(n=>({...n,rid:n.id,isFocus:n.id===graphFocusNodeId}));
        displayCount=nodes.length;
    } else {
        displayCount=Math.min(filteredNodes.length,500);
        nodes=filteredNodes.slice(0,displayCount).map(n=>({...n,rid:n.id,isFocus:false}));
    }
    const nodeIds=new Set(nodes.map(n=>n.rid));

    // 建立边的双向映射
    const links=[];
    const outLinks=new Map(); // source -> [targets]
    inLinks=new Map();  // target -> [sources] (全局变量)
    nodes.forEach(n=>{
        if(n.prerequisites)for(const p of getPrereqIds(n.prerequisites)){
            if(nodeIds.has(p)){
                links.push({source:p,target:n.id});
                outLinks.set(p,(outLinks.get(p)||[]).concat([n.id]));
                inLinks.set(n.id,(inLinks.get(n.id)||[]).concat([p]));
            }
        }
    });

    // 对只显示子节点但父节点不在的情况，创建聚合边(虚拟根)
    const virtualNodes=[];
    const virtualRootId='_vr_';
    let virtualCount=0;
    const prereqsOutside=new Map(); // nid -> count of outside prereqs
    nodes.forEach(n=>{
        const prereqs=getPrereqIds(n.prerequisites)||[];
        const outside=prereqs.filter(p=>!nodeIds.has(p));
        if(outside.length>0){
            virtualCount++;
            prereqsOutside.set(n.id, outside.length);
            if(!nodeIds.has(virtualRootId)){
                virtualNodes.push({rid:virtualRootId,name:{zh:'前置知识'},branch:n.branch,tags:n.tags,level:n.level,difficulty:1,importance:1,isVirtual:true});
                nodeIds.add(virtualRootId);
            }
            links.push({source:virtualRootId,target:n.id,isVirtual:true});
        }
    });

    document.getElementById('graphNodeCount').textContent=nodes.length+virtualNodes.length;
    // 显示/隐藏聚焦标签
    const focusLabel=document.getElementById('graphFocusLabel');
    if(graphFocusNodeId){
        const fn=allNodes.find(n=>n.id===graphFocusNodeId);
        focusLabel.textContent='🎯 聚焦: '+(fn?.name?.zh||graphFocusNodeId);
        focusLabel.style.display='inline-block';
    } else {
        focusLabel.style.display='none';
    }
    document.getElementById('graphEdgeCount').textContent=links.length;

    // 节点颜色
    function nodeColor(d){
        if(d.isVirtual)return '#e2e8f0';
        // 聚焦节点高亮
        if(d.isFocus)return '#db2777';
        if(graphMode==='grade'){
            const g=d.tags&&d.tags.find(t=>GRADE_COLOR[t]);
            return g?GRADE_COLOR[g]:'#94a3b8';
        } else if(graphMode==='branch'){
            const colors={arithmetic:'#10b981',algebra:'#6366f1',geometry:'#f59e0b',analysis:'#ef4444',probability:'#8b5cf6',statistics:'#06b6d4',discrete:'#84cc16',number_theory:'#ec4899',logic:'#14b8a6',topology:'#f97316',other:'#94a3b8',
            // 中文分支
            '小学数学':'#f97316','高等数学':'#ef4444','拓扑学':'#f97316','图论':'#84cc16','博弈论':'#ec4899','范畴论':'#14b8a6','随机过程':'#8b5cf6','算术':'#10b981','控制论':'#06b6d4','线性代数':'#6366f1','复分析':'#ef4444','概率论':'#8b5cf6','统计学':'#06b6d4','组合数学':'#84cc16','离散数学':'#84cc16','逻辑学':'#14b8a6','优化理论':'#f59e0b','动力系统':'#f97316','数值分析':'#ef4444','偏微分方程':'#ef4444','集合论':'#14b8a6','三角学':'#f59e0b','数论':'#ec4899','泛函分析':'#ef4444','微分几何':'#f59e0b','抽象代数':'#6366f1',
            // 详细分支
            '抽象代数(详细)':'#8b5cf6','微分几何(详细)':'#8b5cf6','复分析(详细)':'#8b5cf6',
            // 英文分支
            'functional_analysis':'#ef4444','differential_geometry':'#f59e0b','abstract_algebra':'#6366f1','category_theory':'#14b8a6','stochastic_processes':'#8b5cf6','graph_theory':'#84cc16','game_theory':'#ec4899','control_theory':'#06b6d4'};
            return colors[d.branch]||'#94a3b8';
        }
        const known=userKnowledge[d.id]?.status==='known';
        return known?'#10b981':'#cbd5e0';
    }

    // 图例
    const legendEl=document.getElementById('graphLegend');
    if(graphMode==='grade'){
        legendEl.innerHTML=GRADE_LEVELS.slice(1).map(g=>`<div class="legend-row"><div class="legend-circle" style="background:${g.color}"></div><span>${g.name}</span></div>`).join('');
    } else if(graphMode==='branch'){
        const used=new Set(nodes.map(n=>n.branch));
        legendEl.innerHTML=Object.entries(BRANCH_NAMES).filter(([k])=>used.has(k)).map(([k,v])=>`<div class="legend-row"><div class="legend-circle" style="background:${{arithmetic:'#10b981',algebra:'#6366f1',geometry:'#f59e0b',analysis:'#ef4444',probability:'#8b5cf6',statistics:'#06b6d4',discrete:'#84cc16',number_theory:'#ec4899',logic:'#14b8a6',topology:'#f97316',other:'#94a3b8','小学数学':'#f97316','高等数学':'#ef4444','拓扑学':'#f97316','图论':'#84cc16','博弈论':'#ec4899','范畴论':'#14b8a6','随机过程':'#8b5cf6','算术':'#10b981','控制论':'#06b6d4','线性代数':'#6366f1','复分析':'#ef4444','概率论':'#8b5cf6','统计学':'#06b6d4','组合数学':'#84cc16','离散数学':'#84cc16','逻辑学':'#14b8a6','优化理论':'#f59e0b','动力系统':'#f97316','数值分析':'#ef4444','偏微分方程':'#ef4444','集合论':'#14b8a6','三角学':'#f59e0b','数论':'#ec4899','泛函分析':'#ef4444','微分几何':'#f59e0b','抽象代数':'#6366f1','抽象代数(详细)':'#8b5cf6','微分几何(详细)':'#8b5cf6','复分析(详细)':'#8b5cf6','functional_analysis':'#ef4444','differential_geometry':'#f59e0b','abstract_algebra':'#6366f1','category_theory':'#14b8a6','stochastic_processes':'#8b5cf6','graph_theory':'#84cc16','game_theory':'#ec4899','control_theory':'#06b6d4'}[k]||'#94a3b8'}"></div><span>${v}</span></div>`).join('');
    } else {
        legendEl.innerHTML=`<div class="legend-row"><div class="legend-circle" style="background:#10b981"></div><span>已掌握</span></div><div class="legend-row"><div class="legend-circle" style="background:#cbd5e0"></div><span>未同步</span></div>`;
    }

    const allGraphNodes=[...nodes,...virtualNodes];
    const sim=d3.forceSimulation(allGraphNodes)
        .force('link',d3.forceLink(links).id(n=>n.rid).distance(d=>d.isVirtual?20:(d.source.branch===d.target.branch?40:60)).strength(d=>d.isVirtual?0.1:0.5))
        .force('charge',d3.forceManyBody().strength(-200))
        .force('center',d3.forceCenter(W/2,H/2))
        .force('collision',d3.forceCollide().radius(16))
        .force('x',d3.forceX(W/2).strength(0.03))
        .force('y',d3.forceY(H/2).strength(0.03));

    const g=svg.append('g');
    svg.call(d3.zoom().scaleExtent([.2,3]).on('zoom',e=>g.attr('transform',e.transform)));

    const link=g.append('g').selectAll('line').data(links).enter().append('line').attr('class','graph-link').attr('stroke-width',d=>d.isVirtual?0.5:1).attr('stroke',d=>d.isVirtual?'#94a3b8':'#cbd5e0').attr('stroke-opacity',d=>d.isVirtual?0.2:0.4);
    const node=g.append('g').selectAll('g').data(allGraphNodes).enter().append('g').attr('class','graph-node').call(d3.drag().on('start',function(e,d){if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',function(e,d){d.fx=e.x;d.fy=d.y}).on('end',function(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

    node.append('circle').attr('r',d=>d.isVirtual?4:(userKnowledge[d.id]?.status==='known'?9:7)).attr('fill',nodeColor).attr('stroke',d=>d.isVirtual?'none':'#fff').attr('stroke-width',d=>d.isVirtual?0:2);
    node.append('text').attr('dx',11).attr('dy',4).text(d=>d.isVirtual?`前置(+${prereqsOutside.get(d.rid)||0})`:(d.name?.zh||d.name||'').substring(0,8)).attr('font-size',d=>d.isVirtual?'7px':'9px').attr('fill',d=>d.isVirtual?'#94a3b8':'#64748b').attr('font-style',d=>d.isVirtual?'italic':'normal');

    const tip=document.getElementById('graphTooltip');
    node.on('mouseover',function(event,d){
        const gtag=d.tags&&d.tags.find(t=>GRADE_COLOR[t])||'未分类';
        const known=userKnowledge[d.id]?.status==='known';
        tip.style.display='block';tip.style.left=(event.clientX+12)+'px';tip.style.top=(event.clientY-10)+'px';
        tip.innerHTML=`<div class="graph-tooltip-title">${d.name?.zh||d.name||''}</div><div class="graph-tooltip-meta">${gtag} · ${d.branch?(BRANCH_NAMES[d.branch]||d.branch):'其他'}<br>难度: ${d.difficulty}/10 · ${known?'✅ 已掌握':'⚪ 未同步'}</div>`;
    }).on('mousemove',function(event){tip.style.left=(event.clientX+12)+'px';tip.style.top=(event.clientY-10)+'px'}).on('mouseout',function(){tip.style.display='none'}).on('click',function(d){openDetail(d.id)});

    sim.on('tick',()=>{
        link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        node.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
    currentSimulation=sim;
}

function resetGraph(){graphFocusNodeId=null;renderGraph()}
function graphZoom(factor){const svg=d3.select('#graphSvg');svg.transition().call(d3.zoom().scaleBy,factor)}

// 从猜想弹窗跳转到关联图谱
function viewConjectureGraph(nodeId){
    // 关闭所有弹窗
    document.querySelectorAll('[style*="position:fixed"]').forEach(el=>{
        if(el.style.zIndex>='1000') el.remove();
    });
    // 设置聚焦节点
    graphFocusNodeId = nodeId;
    // 切换到图谱页
    showPage('graph');
    // 稍等 DOM 渲染完再高亮
    setTimeout(()=>{
        // 在图谱中高亮聚焦节点
        const focusNode = allNodes.find(n=>n.id===nodeId);
        if(!focusNode) return;
        // 显示提示
        showToast('🗺️ 已定位到「'+(focusNode.name?.zh||nodeId)+'」的关联图谱');
    }, 400);
}

function renderListPage(){
    const main=document.getElementById('mainContent');
    main.innerHTML=`<div class="page-header">
        <div class="page-title">知识库 <span>${filteredNodes.length} 个知识点</span></div>
        <select class="sort-select" onchange="sortNodes(this.value)">
            <option value="difficulty">按难度 ↑</option>
            <option value="difficulty-desc">按难度 ↓</option>
            <option value="importance">按重要性 ↑</option>
            <option value="importance-desc">按重要性 ↓</option>
            <option value="name">按名称</option>
        </select>
    </div>
    <div class="nodes-grid" id="nodesGrid"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-top:10px;border-top:1px solid var(--border)">
        <div id="paginationInfo" style="font-size:.85em;color:var(--text-secondary)"></div>
        <div id="paginationBtns" style="display:flex;gap:4px;align-items:center"></div>
    </div>`;
    listPage = 1;
    renderList();
}

function sortNodes(order){
    switch(order){
        case'difficulty':filteredNodes.sort((a,b)=>a.difficulty-b.difficulty);break;
        case'difficulty-desc':filteredNodes.sort((a,b)=>b.difficulty-a.difficulty);break;
        case'importance':filteredNodes.sort((a,b)=>a.importance-b.importance);break;
        case'importance-desc':filteredNodes.sort((a,b)=>b.importance-a.importance);break;
        case'name':filteredNodes.sort((a,b)=>(a.name?.zh||'').localeCompare(b.name?.zh||''));break;
    }
    listPage = 1;
    renderList();
}

// 分页相关变量
let listPage = 1;
const pageSize = 50;

function renderList(){
    const grid=document.getElementById('nodesGrid');
    if(!grid)return;
    if(filteredNodes.length===0){grid.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📚</div><div class="empty-state-title">暂无数据</div></div>`;document.getElementById('paginationInfo').innerHTML='';document.getElementById('paginationBtns').innerHTML='';return}
    
    // 计算分页
    const totalPages = Math.ceil(filteredNodes.length / pageSize);
    const start = (listPage - 1) * pageSize;
    const end = Math.min(start + pageSize, filteredNodes.length);
    const pageNodes = filteredNodes.slice(start, end);
    
    grid.innerHTML=pageNodes.map(n=>{
        const gradeTag=n.tags&&n.tags.find(t=>GRADE_COLOR[t]);
        const borderColor=gradeTag?GRADE_COLOR[gradeTag]:'var(--primary)';
        const hasPrereq=n.prerequisites&&n.prerequisites.length>0;
        const inDegree=(inLinks.get(n.id)||[]).length;
        const isIsolated=!hasPrereq&&inDegree===0;
        const diffDots=Array.from({length:10},(_,i)=>`<div class="diff-dot${i<n.difficulty?' filled':''}"></div>`).join('');
        return `<div class="node-card" onclick="openDetail('${n.id}')" style="--accent:${borderColor}">
            <style>.node-card[style*="${borderColor}"]::before{background:${borderColor}}</style>
            <div class="node-card-header">
                <div class="node-card-title">${n.name?.zh||n.name||''}</div>
                <div style="display:flex;gap:4px;align-items:center">
                    <span class="type-badge ${TYPE_BADGE[n.type]||'tb-concept'}">${n.type||'概念'}</span>
                    <a href="/app/web/admin.html?node=${n.id}" target="_blank" onclick="event.stopPropagation()" style="padding:2px 6px;background:#6366f1;color:#fff;text-decoration:none;border-radius:4px;font-size:.7em">管理</a>
                </div>
            </div>
            <div class="node-card-desc">${n.description?.zh||n.description||''}</div>
            <div class="node-card-tags">
                ${gradeTag?`<span class="mini-tag mt-grade">${gradeTag}</span>`:''}
                ${n.branch?`<span class="mini-tag mt-branch">${BRANCH_NAMES[n.branch]||n.branch}</span>`:''}
            </div>
            <div class="node-card-footer">
                <div class="diff-row">
                    <span>难度</span>
                    <div class="diff-dots">${diffDots}</div>
                </div>
                <div class="time-est">⏱ ${n.estimated_minutes||60}min</div>
                <div class="prereq-chip${hasPrereq?' has':''}${isIsolated?' isolated':''}">▶ ${isIsolated?'🔴 孤立':hasPrereq?n.prerequisites.length+'个先修':'无先修'}</div>
            </div>
        </div>`;
    }).join('');
    
}

function renderPagination(totalPages, total, start, end){
    const infoEl = document.getElementById('paginationInfo');
    const btnsEl = document.getElementById('paginationBtns');
    
    if(totalPages <= 1){
        infoEl.innerHTML = `显示 ${start+1}-${end} / 共 ${total} 条`;
        btnsEl.innerHTML = '';
        return;
    }
    
    infoEl.innerHTML = `显示 ${start+1}-${end} / 共 ${total} 条`;
    
    // 分页按钮
    let btns = '';
    
    // 上一页
    if(listPage > 1){
        btns += `<button onclick="goPage(${listPage-1})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer">◀ 上一页</button>`;
    }
    
    // 页码
    const maxPages = 7;
    let pages = [];
    if(totalPages <= maxPages){
        pages = Array.from({length: totalPages}, (_,i) => i+1);
    } else {
        pages = [1];
        if(listPage > 3) pages.push('...');
        for(let i = Math.max(2, currentPage-1); i <= Math.min(totalPages-1, currentPage+1); i++){
            pages.push(i);
        }
        if(listPage < totalPages-2) pages.push('...');
        pages.push(totalPages);
    }
    
    pages.forEach(p => {
        if(p === '...'){
            btns += `<span style="padding:4px 8px">...</span>`;
        } else {
            const active = p === listPage ? 'background:var(--primary);color:#fff;border:none' : '';
            btns += `<button onclick="goPage(${p})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer;${active}">${p}</button>`;
        }
    });
    
    // 下一页
    if(listPage < totalPages){
        btns += `<button onclick="goPage(${listPage+1})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer">下一页 ▶</button>`;
    }
    
    btnsEl.innerHTML = btns;
}

function goPage(page){
    listPage = page;
    currentPage = page;
    renderList();
}

async function renderQuizPage(){
    // 如果已有进行中的评测，先恢复状态
    const hasInProgress = quizQuestions.length > 0 && quizIndex < quizQuestions.length;

    // 获取当前年级的分支列表
    const gradeNodes = quizLevel ? allNodes.filter(n => n.tags && n.tags.includes(quizLevel)) : [];
    const branchCounts = {};
    gradeNodes.forEach(n => {
        const b = n.branch || 'other';
        branchCounts[b] = (branchCounts[b] || 0) + 1;
    });

    // 年级按钮行
    const gradeBtns = GRADE_LEVELS.filter(g => g.id !== 'all').map(g => {
        const total = allNodes.filter(n => n.tags && n.tags.includes(g.id)).length;
        const known = userKnowledge ? allNodes.filter(n => n.tags && n.tags.includes(g.id) && userKnowledge[n.id]).length : 0;
        const syncStatus = known > 0 ? `<span style="color:#10b981;font-size:.7em">✓${known}</span>` : '';
        return `<button class="mini-btn${quizLevel===g.id?' active':''}" onclick="selectQuizLevel('${g.id}')" style="padding:5px 10px;font-size:.8em">${g.name}<span style="opacity:.6;margin-left:3px">${total}${syncStatus}</span></button>`;
    }).join('');

    // 分支按钮行（仅大学及以上显示）
    let branchBtns = '';
    if (quizLevel === '大学及以上') {
        branchBtns = `<div style="margin-bottom:10px">
            <div style="font-size:.78em;color:var(--text-secondary);margin-bottom:6px;font-weight:500">按分支筛选</div>
            <div style="display:flex;flex-wrap:wrap;gap:5px">
                <button class="mini-btn${quizBranch===''?' active':''}" onclick="selectQuizBranch('')" style="padding:4px 9px;font-size:.78em">全部</button>
                ${Object.entries(branchCounts).sort((a,b)=>b[1]-a[1]).map(([k,c])=>`<button class="mini-btn${quizBranch===k?' active':''}" onclick="selectQuizBranch('${k}')" style="padding:4px 9px;font-size:.78em">${BRANCH_NAMES[k]||k}(${c})</button>`).join('')}
            </div>
        </div>`;
    }

    // 进度信息
    let progressHtml = '';
    if (hasInProgress) {
        const pct = (quizIndex / quizQuestions.length * 100).toFixed(0);
        progressHtml = `<div class="quiz-progress-wrap" style="margin-top:10px">
            <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
            <div class="quiz-progress-text">${quizIndex}/${quizQuestions.length}</div>
        </div>`;
    }

    document.getElementById('mainContent').innerHTML = `<div class="quiz-page">
        <div class="quiz-header">
            <div style="font-size:1.1em;font-weight:600;margin-bottom:10px">📝 知识点同步</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${gradeBtns}</div>
            ${branchBtns}
            <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
                <button class="mini-btn${hasInProgress?' active':''}" onclick="startQuiz()" id="startQuizBtn">${hasInProgress?'▶ 继续同步':'开始同步'}</button>
                ${quizLevel ? `<button class="mini-btn" onclick="syncAll('${quizLevel}')" style="background:#10b981;color:#fff;border:none">⚡ 全部同步</button>` : ''}
            </div>
            ${progressHtml}
        </div>
        <div id="quizContent"></div>
    </div>`;

    if (hasInProgress) renderQuizContent();
}

function selectQuizLevel(l) {
    quizLevel = l;
    quizBranch = '';
    quizQuestions = [];
    quizIndex = 0;
    quizAnswers = {};
    quizReviewed = new Set();
    renderQuizPage();
}

function selectQuizBranch(b) {
    quizBranch = b;
    quizQuestions = [];
    quizIndex = 0;
    quizAnswers = {};
    quizReviewed = new Set();
    renderQuizPage();
}

async function startQuiz() {
    if (!quizLevel) { showToast('请先选择年级'); return; }

    // 从前端过滤（用 quizReviewed 排除本轮已同步的，不依赖 userKnowledge）
    let pool = allNodes.filter(n => n.tags && n.tags.includes(quizLevel) && !quizReviewed.has(n.id));
    if (quizBranch) pool = pool.filter(n => n.branch === quizBranch);

    if (pool.length === 0) { showToast('该范围内知识点已全部评测'); return; }

    // 随机打乱，取最多50题
    pool.sort(() => Math.random() - 0.5);
    quizQuestions = pool; // 全部知识点
    quizIndex = 0;
    quizAnswers = {};
    renderQuizContent();
}

async function renderQuizContent() {
    const el = document.getElementById('quizContent');
    if (!el) return;

    if (quizQuestions.length === 0 || quizIndex >= quizQuestions.length) {
        if (Object.keys(quizAnswers).length > 0) {
            // 保存到后端
            const assessments = Object.entries(quizAnswers).map(([id, k]) => ({ node_id: id, known: k }));
            await fetch(`${API}/users/${USER_ID}/assess`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: USER_ID, assessments })
            }).catch(() => {});
            await loadUserKnowledge();
            const done = Object.keys(quizAnswers).length;
            el.innerHTML = `<div class="quiz-card" style="text-align:center">
                <div style="font-size:2em;margin-bottom:12px">🎉</div>
                <div style="font-size:1.1em;font-weight:600;margin-bottom:8px">本轮评测完成！</div>
                <div style="color:var(--text-secondary);margin-bottom:6px">已完成 <strong>${done}</strong> 道题，已保存</div>
                <div style="color:var(--text-secondary);margin-bottom:16px;font-size:.85em">（如需继续同步同年级其他分支，可再次点击"开始同步"）</div>
                <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
                    <button class="quiz-action-btn primary" onclick="startQuiz()">再测一轮</button>
                    <button class="quiz-action-btn" onclick="renderQuizPage()">更换年级/分支</button>
                    <button class="quiz-action-btn" onclick="showPage('stats')">查看统计</button>
                </div>
            </div>`;
        } else {
            el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-title">选择年级和分支开始同步</div></div>`;
        }
        return;
    }

    const q = quizQuestions[quizIndex];
    const pct = (quizIndex / quizQuestions.length * 100).toFixed(0);
    const gradeTag = q.tags && q.tags.find(t => GRADE_COLOR[t]) || quizLevel;
    const branchName = BRANCH_NAMES[q.branch] || q.branch || '';

    el.innerHTML = `<div class="quiz-card">
        <div class="quiz-progress-wrap" style="margin-bottom:14px">
            <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
            <div class="quiz-progress-text">${quizIndex + 1}/${quizQuestions.length}</div>
        </div>
        <div class="quiz-question">${q.name?.zh || q.name || ''}</div>
        <div class="quiz-meta">
            <span class="quiz-meta-tag mt-grade">${gradeTag}</span>
            ${branchName ? `<span class="quiz-meta-tag mt-branch">${branchName}</span>` : ''}
        </div>
        ${q.detail ? `<div style="margin:12px 0;padding:10px;background:#f8fafc;border-radius:8px;border-left:3px solid #6366f1">
            <div style="font-size:.75em;color:#6366f1;font-weight:600;margin-bottom:4px">📖 定义</div>
            <div style="font-size:.9em;color:#334155;line-height:1.5">${q.detail.definition || ''}</div>
            ${q.detail.explanation ? `<div style="font-size:.85em;color:#64748b;margin-top:8px">💡 ${q.detail.explanation}</div>` : ''}
        </div>` : ''}
        ${q.examples && q.examples.length > 0 ? `<div style="margin:12px 0">
            <div style="font-size:.75em;color:#059669;font-weight:600;margin-bottom:6px">📝 例题</div>
            ${q.examples.slice(0,2).map((ex,i) => `<div style="background:#f0fdf4;padding:10px;border-radius:6px;margin-bottom:6px;font-size:.85em">
                <div style="color:#1e293b">例${i+1}: ${ex.question || ''}</div>
                <div style="color:#16a34a;margin-top:4px">答案: ${ex.answer || ''}</div>
                ${ex.solution ? `<div style="color:#64748b;font-size:.8em;margin-top:4px">解析: ${ex.solution}</div>` : ''}
            </div>`).join('')}
        </div>` : ''}
        <div class="quiz-btn-group">
            <button class="quiz-btn quiz-btn-known" onclick="answerQuiz(true)">✅ 掌握</button>
            <button class="quiz-btn quiz-btn-unknown" onclick="answerQuiz(false)">❌ 不熟悉</button>
        </div>
    </div>`;

async function answerQuiz(known) {
    const q = quizQuestions[quizIndex];
    const id = q.id;
    quizAnswers[id] = known;
    quizReviewed.add(id);
    quizIndex++;
    renderQuizContent();
}

function renderConjectureList(){
    // 获取猜想 + 问题
    let conjectures = allNodes.filter(n =>
        n.type === 'conjecture' ||
        n.type === 'problem' ||
        (n.tags && (n.tags.includes('数学猜想') || n.tags.includes('数学问题') || n.tags.includes('重要问题')))
    );
    
    const conj = conjectures.filter(n => n.type === 'conjecture');
    const prob = conjectures.filter(n => n.type === 'problem');
    const proved = conjectures.filter(n => ['proved','disproved'].includes(n.status));
    const unproved = conjectures.filter(n => ['unproved','unknown'].includes(n.status));
    
    document.getElementById('conjectureStats').innerHTML = `
        <div style="background:var(--surface);padding:12px 20px;border-radius:10px;box-shadow:var(--shadow)">
            <div style="font-size:1.8em;font-weight:700;color:var(--primary)">${conjectures.length}</div>
            <div style="font-size:.82em;color:var(--text-secondary)">全部前沿问题</div>
        </div>
        <div style="background:#fce7f3;padding:12px 20px;border-radius:10px;box-shadow:var(--shadow)">
            <div style="font-size:1.8em;font-weight:700;color:#db2777">${conj.length}</div>
            <div style="font-size:.82em;color:#be185d">🤔 猜想</div>
        </div>
        <div style="background:#fef3c7;padding:12px 20px;border-radius:10px;box-shadow:var(--shadow)">
            <div style="font-size:1.8em;font-weight:700;color:#d97706">${prob.length}</div>
            <div style="font-size:.82em;color:#b45309">❓ 未解问题</div>
        </div>
        <div style="background:#fee2e2;padding:12px 20px;border-radius:10px;box-shadow:var(--shadow)">
            <div style="font-size:1.8em;font-weight:700;color:#dc2626">${unproved.length}</div>
            <div style="font-size:.82em;color:#b91c1c">❓ 未解决</div>
        </div>
        <div style="background:#dcfce7;padding:12px 20px;border-radius:10px;box-shadow:var(--shadow)">
            <div style="font-size:1.8em;font-weight:700;color:#16a34a">${proved.length}</div>
            <div style="font-size:.82em;color:#15803d">✅ 已解决</div>
        </div>`;
    
    // 过滤
    if(conjectureFilter === 'conjecture'){ conjectures = conj; }
    else if(conjectureFilter === 'problem'){ conjectures = prob; }
    else if(conjectureFilter === 'proved'){ conjectures = conjectures.filter(n => ['proved','disproved'].includes(n.status)); }
    else if(conjectureFilter === 'unproved'){ conjectures = conjectures.filter(n => ['unproved','unknown'].includes(n.status)); }
    
    // 排序
    if(conjectureSort === 'difficulty'){
        conjectures.sort((a,b) => (b.difficulty||50) - (a.difficulty||50));
    } else if(conjectureSort === 'name'){
        conjectures.sort((a,b) => (a.name?.zh||'').localeCompare(b.name?.zh||''));
    }
    
    const list = document.getElementById('conjectureList');
    if(conjectures.length === 0){
        list.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-secondary)">暂无符合条件的记录</div>';
        return;
    }
    
    const statusColors = {
        proved: {bg:'#dcfce7', color:'#16a34a', text:'✅ 已解决'},
        disproved: {bg:'#fee2e2', color:'#dc2626', text:'❌ 已否定'},
        partially_proved: {bg:'#fef3c7', color:'#d97706', text:'🔄 部分解决'},
        unproved: {bg:'#fee2e2', color:'#dc2626', text:'❓ 未解决'},
        disputed: {bg:'#fef3c7', color:'#d97706', text:'⚠️ 争议中'},

    list.innerHTML = conjectures.map(c => {

        const isConj = type === 'conjecture';
        const sc = statusColors[status] || statusColors.unknown;
        const diffDots = Math.round(difficulty / 20);
        const diffLabel = diffLabels[diffDots] || '未知';
        const typeLabel = isConj ? '🤔 猜想' : '❓ 问题';
        const typeColor = isConj ? '#db2777' : '#d97706';
        
        return `
        <div class="conjecture-card" onclick="showConjectureDetail('${c.id}')" style="background:var(--surface);border-radius:14px;padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;border:1px solid var(--border)">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
                <h3 style="font-size:1.05em;font-weight:600;line-height:1.3;flex:1;max-width:70%">${name}</h3>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:8px">
                    <span style="font-size:.72em;padding:2px 8px;border-radius:20px;font-weight:600;background:${typeColor}22;color:${typeColor}">${typeLabel}</span>
                    <span style="font-size:.72em;padding:2px 8px;border-radius:20px;font-weight:600;background:${sc.bg};color:${sc.color}">${sc.text}</span>
                </div>
            </div>
            <p style="font-size:.85em;color:var(--text-secondary);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${desc}</p>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
                ${year ? `<span style="font-size:.78em;padding:3px 8px;background:#f1f5f9;border-radius:6px;color:var(--text-secondary)">📅 ${year}</span>` : ''}
                ${proposer ? `<span style="font-size:.78em;padding:3px 8px;background:#f1f5f9;border-radius:6px;color:var(--text-secondary)">👤 ${proposer}</span>` : ''}
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)">
                <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-size:.78em;color:var(--text-secondary)">难度:</span>
                    <div style="display:flex;gap:3px">
                        ${[1,2,3,4,5].map(i => `<div style="width:8px;height:8px;border-radius:50%;background:${i<=diffDots?'#f59e0b':'#e2e8f0'}"></div>`).join('')}
                    </div>
                    <span style="font-size:.75em;color:var(--text-secondary)">${diffLabel}</span>
                </div>
                <span style="font-size:.78em;color:var(--text-secondary)">▶ 查看详情</span>
            </div>
        </div>`;
    }).join('');
    
}

function renderPagination(totalPages, total, start, end){
    const infoEl = document.getElementById('paginationInfo');
    const btnsEl = document.getElementById('paginationBtns');
    
    if(totalPages <= 1){
        infoEl.innerHTML = `显示 ${start+1}-${end} / 共 ${total} 条`;
        btnsEl.innerHTML = '';
        return;
    }
    
    infoEl.innerHTML = `显示 ${start+1}-${end} / 共 ${total} 条`;
    
    // 分页按钮
    let btns = '';
    
    // 上一页
    if(listPage > 1){
        btns += `<button onclick="goPage(${listPage-1})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer">◀ 上一页</button>`;
    }
    
    // 页码
    const maxPages = 7;
    let pages = [];
    if(totalPages <= maxPages){
        pages = Array.from({length: totalPages}, (_,i) => i+1);
    } else {
        pages = [1];
        if(listPage > 3) pages.push('...');
        for(let i = Math.max(2, currentPage-1); i <= Math.min(totalPages-1, currentPage+1); i++){
            pages.push(i);
        }
        if(listPage < totalPages-2) pages.push('...');
        pages.push(totalPages);
    }
    
    pages.forEach(p => {
        if(p === '...'){
            btns += `<span style="padding:4px 8px">...</span>`;
        } else {
            const active = p === listPage ? 'background:var(--primary);color:#fff;border:none' : '';
            btns += `<button onclick="goPage(${p})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer;${active}">${p}</button>`;
        }
    });
    
    // 下一页
    if(listPage < totalPages){
        btns += `<button onclick="goPage(${listPage+1})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer">下一页 ▶</button>`;
    }
    
    btnsEl.innerHTML = btns;
}

function goPage(page){
    listPage = page;
    currentPage = page;
    renderList();
}

function showConjectureDetail(nodeId){
    try {
    // 全局辅助函数已在上方定义
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\n/g,'<br>');
    }
    const node = allNodes.find(n => n.id === nodeId);
    if(!node) {
        console.error('节点未找到:', nodeId);
        return;
    }
    
    const name = escapeHtml(node.name?.zh || node.name?.en || '');
    const desc = escapeHtml(node.description?.zh || node.name?.zh || '');
    const status = node.status || 'unknown';
    const year = node.year || '';
    const proposer = node.proposer || '';
    const statusDetail = node.status_detail || '';
    const branch = node.branch || '';
    const type = node.type || 'conjecture';
    const isConj = type === 'conjecture';
    
    const statusColors = {
        proved: {bg:'#dcfce7', color:'#16a34a', text:'✅ 已解决'},
        disproved: {bg:'#fee2e2', color:'#dc2626', text:'❌ 已否定'},
        partially_proved: {bg:'#fef3c7', color:'#d97706', text:'🔄 部分解决'},
        unproved: {bg:'#fee2e2', color:'#dc2626', text:'❓ 未解决'},
        disputed: {bg:'#fef3c7', color:'#d97706', text:'⚠️ 争议中'}
    };
    const sc = statusColors[status] || {bg:'#f1f5f9',color:'#64748b',text:'❓ 未知'};
    
    const prereqs = getPrereqIds(node.prerequisites).map(pid => {
        const p = allNodes.find(n => n.id === pid);
        return p ? `<span onclick="showConjectureDetail('${pid}')" style="display:inline-block;padding:4px 10px;background:#dbeafe;border-radius:6px;font-size:.8em;color:#0284c7;cursor:pointer;margin:2px">${p.name?.zh||pid}</span>` : '';
    }).join('');
    
    const related = allNodes.filter(n => {
        if(n.id === nodeId) return false;
        const nname = (n.name?.zh||'') + (n.name?.en||'');
        return nname.includes(name.substring(0,4)) || (n.branch === branch && n.type !== 'conjecture' && n.type !== 'problem');
    }).slice(0,12).map(n => {
        return `<span onclick="showConjectureDetail('${n.id}')" style="display:inline-block;padding:4px 10px;background:#f1f5f9;border-radius:6px;font-size:.8em;color:#64748b;cursor:pointer;margin:2px">${n.name?.zh||n.id}</span>`;
    }).join('');
    
    const typeLabel = isConj ? '🤔 猜想' : '❓ 数学问题';
    const typeColor = isConj ? '#db2777' : '#d97706';
    
    const modal = document.createElement('div');
    modal.style = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px';
    modal.onclick = (e) => { if(e.target===modal) modal.remove(); };
    modal.innerHTML = `
    <div style="background:var(--surface);border-radius:16px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg)">
        <div style="padding:24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
            <h2 style="font-size:1.3em;font-weight:700">${name}</h2>
            <button onclick="this.closest('div').parentElement.remove()" style="background:none;border:none;font-size:1.5em;cursor:pointer;padding:8px;color:var(--text-secondary)">×</button>
        </div>
        <div style="padding:24px">
            <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
                <span style="padding:4px 12px;border-radius:20px;font-size:.85em;font-weight:600;background:${typeColor}22;color:${typeColor}">${typeLabel}</span>
                <span style="padding:4px 12px;border-radius:20px;font-size:.85em;font-weight:600;background:${sc.bg};color:${sc.color}">${sc.text}</span>
                <span style="padding:4px 12px;border-radius:20px;font-size:.85em;background:#f1f5f9;color:var(--text-secondary)">📚 ${branch}</span>
                ${year ? `<span style="padding:4px 12px;border-radius:20px;font-size:.85em;background:#f1f5f9;color:var(--text-secondary)">📅 ${year}年</span>` : ''}
            </div>
            <div style="margin-bottom:20px">
                <h4 style="font-size:.95em;font-weight:600;margin-bottom:8px;color:var(--text)">📝 问题内容</h4>
                <p style="font-size:.9em;line-height:1.7;color:var(--text-secondary)">${desc}</p>
            </div>
            ${proposer ? `<div style="margin-bottom:20px"><h4 style="font-size:.95em;font-weight:600;margin-bottom:8px">👤 提出者</h4><p style="font-size:.9em;color:var(--text-secondary)">${proposer}</p></div>` : ''}
            ${statusDetail ? `<div style="margin-bottom:20px"><h4 style="font-size:.95em;font-weight:600;margin-bottom:8px">📊 状态说明</h4><p style="font-size:.9em;line-height:1.6;color:var(--text-secondary)">${statusDetail}</p></div>` : ''}
            ${prereqs ? `<div style="margin-bottom:20px"><h4 style="font-size:.95em;font-weight:600;margin-bottom:8px">📖 前置知识</h4><div style="display:flex;flex-wrap:wrap;gap:6px">${prereqs}</div></div>` : ''}
            ${related ? `<div style="margin-bottom:20px"><h4 style="font-size:.95em;font-weight:600;margin-bottom:8px">🔗 相关知识</h4><div style="display:flex;flex-wrap:wrap;gap:6px">${related}</div></div>` : ''}
            <div style="display:flex;gap:10px;margin-top:24px">
                <button onclick="viewConjectureGraph('${nodeId}')" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-weight:500">查看关联图谱</button>
            </div>
        </div>
    </div>`;
    document.body.appendChild(modal);
    } catch(e) {
        console.error('showConjectureDetail 错误:', e);
    }
}

let wqCurrentPage = 1;
let wqAllData = [];
let wqUploadFiles = [];

function openWQUpload(){
    document.getElementById('wqUploadModal').style.display='flex';
    wqUploadFiles = [];
    document.getElementById('wqUploadPreview').innerHTML='';
    document.getElementById('wqUploadStatus').innerHTML='';
}
function closeWQUpload(){
    document.getElementById('wqUploadModal').style.display='none';
}
function handleWQDrop(e){
    e.preventDefault();
    e.target.style.borderColor='var(--border)';
    handleWQUploadFiles(e.dataTransfer.files);
}
function handleWQUploadFiles(files){
    for(const f of files){
        if(!f.type.startsWith('image/')) continue;
        wqUploadFiles.push(f);
        const reader = new FileReader();
        reader.onload = e => {
            const div = document.createElement('div');
            div.style.cssText='position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1';
            div.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover"><button onclick="this.parentElement.remove();removeWQFile(\''+f.name+'\')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:.8em;line-height:1">×</button>';
            document.getElementById('wqUploadPreview').appendChild(div);
        };
        reader.readAsDataURL(f);
    }
    document.getElementById('wqUploadStatus').innerHTML='已选择 '+wqUploadFiles.length+' 张图片';
}
function removeWQFile(name){wqUploadFiles=wqUploadFiles.filter(f=>f.name!==name)}

async function saveWQWithImages(){
    if(!wqUploadFiles.length){alert('请先上传至少一张图片');return;}
    const btn = document.getElementById('wqSaveBtn');
    btn.disabled=true; btn.innerText='上传中...';
    document.getElementById('wqUploadStatus').innerHTML='正在上传...';
    try {
        const uploaded = [];
        for(const f of wqUploadFiles){
            const fd = new FormData();
            fd.append('file', f);
            const r = await fetch(API+'/users/'+USER_ID+'/wq-upload', {method:'POST', body:fd});
            if(r.ok){
                const d = await r.json();
                uploaded.push(d.image_id);
            }
        }
        document.getElementById('wqUploadStatus').innerHTML='✅ 上传成功！已上传 '+uploaded.length+' 张图片';
        btn.innerText='完成'; btn.disabled=false;
        setTimeout(()=>{closeWQUpload();renderWrongQuestionsList();},1200);
    } catch(e){
        document.getElementById('wqUploadStatus').innerHTML='❌ 上传失败：'+e.message;
        btn.disabled=false; btn.innerText='保存错题';
    }
}

async function renderWrongQuestionsList(){
    const list = document.getElementById('wqList');
    const statsEl = document.getElementById('wqStats');
    const filter = document.getElementById('wqFilter').value;
    let url = API+'/users/'+USER_ID+'/wrong-questions?limit=100';
    const [statsRes, listRes] = await Promise.all([
        fetch(API+'/users/'+USER_ID+'/wrong-questions/stats').catch(()=>null),
        fetch(url).catch(()=>null)
    ]);
    const stats = statsRes?await statsRes.json():{};
    const data = listRes?await listRes.json():{};
    let wqs = data.wrong_questions||[];
    
    // 过滤
    if(filter==='active') wqs=wqs.filter(w=>!w.review_schedule?.mastered);
    else if(filter==='needs_review') wqs=wqs.filter(w=>{const n=w.review_schedule?.next_review;return n&&new Date(n)<=new Date()&&!w.review_schedule?.mastered;});
    else if(filter==='mastered') wqs=wqs.filter(w=>w.review_schedule?.mastered);
    
    wqAllData = wqs.slice().reverse(); // 最新优先（倒序）
    wqCurrentPage = Math.min(wqCurrentPage, Math.ceil(wqAllData.length/WQ_PAGE_SIZE)||1);
    renderWQPage(wqCurrentPage);
    
    statsEl.innerHTML = '<div style="background:linear-gradient(135deg,#ef4444,#f87171);color:#fff;padding:16px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:700">'+(stats.total_wrong||stats.total_count||0)+'</div><div style="font-size:.85em;opacity:.9">错题总数</div></div>'+
        '<div style="background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff;padding:16px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:700">'+(stats.active||stats.active_count||0)+'</div><div style="font-size:.85em;opacity:.9">未掌握</div></div>'+
        '<div style="background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff;padding:16px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:700">'+(stats.needs_review_today||0)+'</div><div style="font-size:.85em;opacity:.9">待复习</div></div>'+
        '<div style="background:linear-gradient(135deg,#10b981,#34d399);color:#fff;padding:16px;border-radius:12px;text-align:center"><div style="font-size:2em;font-weight:700">'+(stats.mastered||stats.mastered_count||0)+'</div><div style="font-size:.85em;opacity:.9">已掌握</div></div>';
}

function renderWQPage(page){
    const list = document.getElementById('wqList');
    const total = Math.ceil(wqAllData.length/WQ_PAGE_SIZE)||1;
    const start = (page-1)*WQ_PAGE_SIZE;
    const pageWQs = wqAllData.slice(start, start+WQ_PAGE_SIZE);
    
    if(!pageWQs.length){
        list.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-secondary)"><div style="font-size:3em;margin-bottom:12px">✅</div><div>暂无错题</div></div>';
        document.getElementById('wqPagination').innerHTML='';
        return;
    }
    
    list.innerHTML = pageWQs.map(wq => {
        const q = wq.question||{};
        const content = q.content||'';
        const grade = wq._grade||'';
        const concept = wq._concept||'';
        const errors = wq._common_errors||[];
        const mastered = wq.review_schedule&&wq.review_schedule.mastered;
        const stage = wq.review_schedule?wq.review_schedule.stage:1;
        const reviewCount = wq.review_schedule?wq.review_schedule.review_count:0;
        const errorTypeLabel = (ERROR_TYPES||{})[wq.error_type]||wq.error_type||'其他';
        const priority = wq._review_priority||'medium';
        const borderColor = mastered?'#10b981':priority==='high'?'#ef4444':'#f59e0b';
        const images = (wq.wrong_question_images||[]);
        const ansCorrect = (wq.correct_answer||'').replace(/</g,'&lt;').slice(0,300);
        const ansWrong = (wq.wrong_answer||'—').replace(/</g,'&lt;');
        const imgGallery = images.length?'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'+
            images.map(img=>'<img src="'+API+'/users/'+USER_ID+'/wrong-question-images/'+img.id+'/thumb" style="width:72px;height:72px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid #e2e8f0" onclick="document.getElementById(\x27wqImgFull\x27).src=this.src;document.getElementById(\x27wqImgModal\x27).style.display=\'flex\x27" onerror="this.style.display=\'none\x27">').join('')+
            '<button onclick="uploadImgForWQ(\''+wq.id+'\')" style="width:72px;height:72px;border-radius:8px;border:2px dashed #cbd5e0;background:#f8fafc;cursor:pointer;font-size:1.8em;color:#94a3b8;display:flex;align-items:center;justify-content:center">+</button>'+
            '</div>':'<div style="margin-bottom:12px"><button onclick="uploadImgForWQ(\''+wq.id+'\')" style="padding:8px 16px;border-radius:8px;border:1px dashed var(--border);background:#f8fafc;cursor:pointer;font-size:.85em;color:#64748b">📷 添加图片</button></div>';
        return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;border-left:4px solid '+borderColor+'">'+
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
                '<div>'+
                    '<span style="background:'+(mastered?'#dcfce7':'#fef2f2')+';color:'+(mastered?'#16a34a':'#dc2626')+';padding:3px 10px;border-radius:20px;font-size:.8em;font-weight:600;margin-right:6px">'+(mastered?'✅ 已掌握':stage+'轮复习')+'</span>'+
                    (grade?'<span style="background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:20px;font-size:.8em;margin-right:6px">'+grade+'</span>':'')+
                    '<span style="background:#ede9fe;color:#7c3aed;padding:3px 10px;border-radius:20px;font-size:.8em">'+errorTypeLabel+'</span>'+
                '</div>'+
                '<div style="font-size:.8em;color:#94a3b8">复习 '+reviewCount+' 次</div>'+
            '</div>'+
            '<div style="font-size:1em;font-weight:600;color:var(--text);margin-bottom:8px">'+(concept||'未分类')+'</div>'+
            imgGallery+
            '<div style="font-size:.9em;line-height:1.7;color:var(--text-secondary);background:#f8fafc;padding:14px;border-radius:10px;margin-bottom:14px;white-space:pre-wrap;max-height:150px;overflow-y:auto">'+
                content.replace(/</g,'&lt;')+'</div>'+
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">'+
                '<div><div style="font-size:.8em;color:#64748b;margin-bottom:4px">❌ 错误答案</div><div style="background:#fef2f2;color:#dc2626;padding:10px;border-radius:8px;font-size:.9em">'+ansWrong+'</div></div>'+
                '<div><div style="font-size:.8em;color:#64748b;margin-bottom:4px">✅ 正确答案</div><div style="background:#f0fdf4;color:#16a34a;padding:10px;border-radius:8px;font-size:.9em;white-space:pre-wrap">'+ansCorrect+'</div></div>'+
            '</div>'+
            (errors.length?'<div style="margin-bottom:14px"><div style="font-size:.8em;color:#64748b;margin-bottom:6px">⚠️ 易错提醒</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+

            (wq.error_analysis?'<div style="margin-bottom:14px"><div style="font-size:.8em;color:#64748b;margin-bottom:4px">💡 关键点</div><div style="color:#7c3aed;font-size:.9em;padding:10px;background:#f5f3ff;border-radius:8px">'+wq.error_analysis.replace(/</g,'&lt;')+'</div></div>':'')+
            '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
                '<button onclick="reviewWQ(\''+wq.id+'\')" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-weight:500;font-size:.9em">🎯 复习这道题</button>'+
                (mastered?
                    '<button onclick="unmarkWQMastered(\''+wq.id+'\')" style="flex:1;padding:10px;border-radius:8px;border:1px solid #94a3b8;background:#f8fafc;color:#64748b;cursor:pointer;font-size:.9em">🔄 取消掌握</button>':
                    '<button onclick="markWQMastered(\''+wq.id+'\')" style="flex:1;padding:10px;border-radius:8px;border:1px solid #10b981;background:#f0fdf4;color:#16a34a;cursor:pointer;font-weight:500;font-size:.9em">✅ 标记已掌握</button>'
                )+
                '<button onclick="deleteWQ(\''+wq.id+'\')" style="padding:10px 16px;border-radius:8px;border:1px solid #fca5a5;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:.9em">🗑️</button>'+
            '</div></div>';
    }).join('');
    
    // 分页按钮
    const totalPages = Math.ceil(wqAllData.length/WQ_PAGE_SIZE)||1;
    let pBtns = '';
    if(totalPages>1){
        pBtns += '<button onclick="wqGoPage('+(page-1)+')" '+(page<=1?'disabled':'')+' style="padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:'+(page<=1?'not-allowed':'pointer')+';opacity:'+(page<=1?.5:1)+'">‹ 上一页</button>';
        const maxBtns=5, start=Math.max(1,page-Math.floor(maxBtns/2)), end=Math.min(totalPages,start+maxBtns-1);
        for(let i=start;i<=end;i++) pBtns+='<button onclick="wqGoPage('+i+')" style="padding:8px 14px;border-radius:8px;border:1px solid '+(i===page?'#6366f1':'var(--border)')+';background:'+(i===page?'#6366f1':'var(--surface)')+';color:'+(i===page?'#fff':'var(--text)')+';cursor:pointer;font-weight:'+(i===page?600:400)+'">'+i+'</button>';
        pBtns += '<button onclick="wqGoPage('+(page+1)+')" '+(page>=totalPages?'disabled':'')+' style="padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:'+(page>=totalPages?'not-allowed':'pointer')+';opacity:'+(page>=totalPages?.5:1)+'">下一页 ›</button>';
        pBtns += '<span style="padding:8px 12px;font-size:.85em;color:var(--text-secondary)">'+page+'/'+totalPages+'页 共'+wqAllData.length+'条</span>';
    }
    document.getElementById('wqPagination').innerHTML=pBtns;
}

function wqGoPage(p){
    const total=Math.ceil(wqAllData.length/WQ_PAGE_SIZE)||1;
    wqCurrentPage=Math.max(1,Math.min(p,total));
    renderWQPage(wqCurrentPage);
}

let wqUploadForId = null;
function uploadImgForWQ(wqId){
    wqUploadForId = wqId;
    const inp = document.createElement('input');
    inp.type='file'; inp.accept='image/*'; inp.multiple=true;

function renderPagination(totalPages, total, start, end){
    const infoEl = document.getElementById('paginationInfo');
    const btnsEl = document.getElementById('paginationBtns');
    
    if(totalPages <= 1){
        infoEl.innerHTML = `显示 ${start+1}-${end} / 共 ${total} 条`;
        btnsEl.innerHTML = '';
        return;
    }
    
    infoEl.innerHTML = `显示 ${start+1}-${end} / 共 ${total} 条`;
    
    // 分页按钮
    let btns = '';
    
    // 上一页
    if(listPage > 1){
        btns += `<button onclick="goPage(${listPage-1})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer">◀ 上一页</button>`;
    }
    
    // 页码
    const maxPages = 7;
    let pages = [];
    if(totalPages <= maxPages){
        pages = Array.from({length: totalPages}, (_,i) => i+1);
    } else {
        pages = [1];
        if(listPage > 3) pages.push('...');
        for(let i = Math.max(2, currentPage-1); i <= Math.min(totalPages-1, currentPage+1); i++){
            pages.push(i);
        }
        if(listPage < totalPages-2) pages.push('...');
        pages.push(totalPages);
    }
    
    pages.forEach(p => {
        if(p === '...'){
            btns += `<span style="padding:4px 8px">...</span>`;
        } else {
            const active = p === listPage ? 'background:var(--primary);color:#fff;border:none' : '';
            btns += `<button onclick="goPage(${p})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer;${active}">${p}</button>`;
        }
    });
    
    // 下一页
    if(listPage < totalPages){
        btns += `<button onclick="goPage(${listPage+1})" style="padding:4px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer">下一页 ▶</button>`;
    }
    
    btnsEl.innerHTML = btns;
}

function goPage(page){
